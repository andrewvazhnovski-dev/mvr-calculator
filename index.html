<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MVR Calculator | Minimum Viable Rate</title>
    <style>
      :root {
        --bg-dark: #0f172a;
        --panel-bg: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #3b82f6;
        --border: #334155;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        max-width: 900px;
        width: 100%;
      }
      .left-panel,
      .right-panel {
        flex: 1 1 300px;
        min-width: 0;
        background: var(--panel-bg);
        padding: 30px;
        border-radius: 12px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 10px;
      }
      p.subtitle {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 25px;
        line-height: 1.5;
      }
      .input-group {
        margin-bottom: 20px;
      }
      .row {
        display: flex;
        gap: 15px;
      }
      .row .input-group {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        background: var(--bg-dark);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border 0.2s;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }
      input:focus {
        border-color: var(--accent);
      }
      .right-panel {
        border: 1px solid var(--accent);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
      }
      .result-header {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
      }
      .rate-display {
        font-size: 64px;
        font-weight: 700;
        color: var(--text-main);
        line-height: 1.1;
        margin-bottom: 5px;
        white-space: nowrap;
        min-height: 70px;
      }
      .rate-sub {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 40px;
      }
      .breakdown {
        border-top: 1px solid var(--border);
        padding-top: 20px;
        margin-bottom: 30px;
      }
      .breakdown-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--text-muted);
        white-space: nowrap;
        gap: 15px;
      }
      .breakdown-value {
        font-weight: 600;
        color: var(--text-main);
        text-align: right;
      }
      .btn-support {
        display: block;
        width: 100%;
        text-align: center;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        text-decoration: none;
        padding: 15px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 15px;
        transition: opacity 0.2s;
      }
      .btn-support:hover {
        opacity: 0.9;
      }

      @media (max-width: 768px) {
        .container {
          gap: 20px;
        }
        .left-panel,
        .right-panel {
          min-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <h1>MVR Calculator</h1>
        <p class="subtitle">
          Calculate your true freelance hourly rate to avoid burnout.
        </p>

        <div class="input-group">
          <label>Target Annual Net Income ($)</label>
          <input type="text" inputmode="decimal" id="net" value="60000" />
        </div>
        <div class="input-group">
          <label>Annual Business Expenses ($)</label>
          <input type="text" inputmode="decimal" id="exp" value="5000" />
        </div>
        <div class="row">
          <div class="input-group">
            <label>Weeks Off / Year</label>
            <input type="text" inputmode="decimal" id="weeksOff" value="12" />
          </div>
          <div class="input-group">
            <label>Billable Hours / Week</label>
            <input type="text" inputmode="decimal" id="hours" value="25" />
          </div>
        </div>
        <div class="input-group">
          <label>Estimated Tax Rate (%)</label>
          <input type="text" inputmode="decimal" id="tax" value="20" />
        </div>
      </div>

      <div class="right-panel">
        <div>
          <div class="result-header">Your Minimum Rate</div>
          <div class="rate-display" id="rate">$0</div>
          <div class="rate-sub">per billable hour</div>
          <div class="breakdown">
            <div class="breakdown-item">
              <span>Gross Revenue Needed:</span>
              <span class="breakdown-value" id="grossNeeded">$0</span>
            </div>
            <div class="breakdown-item">
              <span>Total Billable Hours/Year:</span>
              <span class="breakdown-value" id="totalHours">0</span>
            </div>
          </div>
        </div>
        <a
          href="https://ko-fi.com/devandrewvazh"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-support"
          >☕ Buy me a coffee / Support Tool</a
        >
      </div>
    </div>

    <script>
      const inputs = document.querySelectorAll("input");

      inputs.forEach((input) => {
        input.dataset.oldValue = input.value;

        input.addEventListener("input", function () {
          let val = this.value;

          // 1. Заменяем запятые на точки для универсальности
          val = val.replace(/,/g, ".");

          // 2. Уничтожаем любой мусор, кроме цифр и точек
          val = val.replace(/[^0-9.]/g, "");

          // 3. Блокируем ввод нескольких точек подряд (оставляем только первую)
          const parts = val.split(".");
          if (parts.length > 2) {
            val = parts[0] + "." + parts.slice(1).join("");
          }

          // 4. Ограничиваем количество знаков после запятой
          const currentParts = val.split(".");
          if (currentParts[1] !== undefined) {
            // Для денег и процентов даем 2 знака (центы), для часов и недель — 1 знак
            let maxDecimals =
              this.id === "hours" || this.id === "weeksOff" ? 1 : 2;
            val =
              currentParts[0] + "." + currentParts[1].substring(0, maxDecimals);
          }

          // 5. Удаляем ведущие нули (например, 05 -> 5), но оставляем 0.x
          if (val.length > 1 && val.startsWith("0") && val[1] !== ".") {
            val = val.replace(/^0+/, "");
            if (val === "") val = "0"; // Защита от полного затирания
          }

          this.value = val;

          // Если поле полностью очищено или там только точка — ничего не считаем
          if (val === "" || val === ".") {
            calculate();
            return;
          }

          // 6. Математическая проверка лимитов
          let numVal = parseFloat(val);
          let maxLimit = 999999999;

          if (this.id === "tax") maxLimit = 99;
          else if (this.id === "weeksOff") maxLimit = 51;
          else if (this.id === "hours") maxLimit = 168;

          if (numVal > maxLimit) {
            this.value = this.dataset.oldValue;
          } else {
            this.dataset.oldValue = this.value;
          }

          calculate();
        });

        // 7. Подчищаем "висячие" точки, если пользователь кликнул в другое место
        input.addEventListener("blur", function () {
          if (this.value.endsWith(".")) {
            this.value = this.value.slice(0, -1);
          }
          if (this.value === "") {
            this.value = "0";
          }
          calculate();
        });
      });

      function scaleText(element, baseSize, maxAllowedWidth) {
        element.style.fontSize = baseSize + "px";
        element.style.display = "inline-block";
        const contentWidth = element.scrollWidth;
        if (contentWidth > maxAllowedWidth && maxAllowedWidth > 0) {
          let ratio = maxAllowedWidth / contentWidth;
          element.style.fontSize = Math.floor(baseSize * ratio * 0.95) + "px";
        }
        element.style.display = "";
      }

      function calculate() {
        const getVal = (id) =>
          parseFloat(document.getElementById(id).value) || 0;
        const net = getVal("net");
        const exp = getVal("exp");
        const weeksOff = getVal("weeksOff");
        const hours = getVal("hours");
        const tax = getVal("tax");

        const totalHours = (52 - weeksOff) * hours;
        let grossNeeded = 0;
        let rate = 0;

        if (totalHours > 0) {
          grossNeeded = net / (1 - tax / 100) + exp;
          rate = grossNeeded / totalHours;
        }

        // Вывод с точным учетом дробных частей
        document.getElementById("totalHours").innerText =
          totalHours.toLocaleString("en-US", { maximumFractionDigits: 1 });
        document.getElementById("grossNeeded").innerText =
          "$" +
          grossNeeded.toLocaleString("en-US", { maximumFractionDigits: 2 });

        const rateEl = document.getElementById("rate");
        rateEl.innerText = "$" + Math.ceil(rate).toLocaleString("en-US");

        const maxPanelWidth = rateEl.closest(".right-panel").clientWidth - 60;
        scaleText(rateEl, 64, maxPanelWidth);

        document.querySelectorAll(".breakdown-item").forEach((item) => {
          const label = item.querySelector("span:first-child");
          const value = item.querySelector(".breakdown-value");
          if (label && value) {
            scaleText(value, 14, maxPanelWidth - label.clientWidth - 20);
          }
        });
      }

      window.addEventListener("resize", calculate);
      calculate();
    </script>
  </body>
</html>
