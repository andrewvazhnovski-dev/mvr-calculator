<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimum Viable Rate (MVR) Calculator | For Freelancers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      input[type="number"] {
        background: #1e293b;
        border: 1px solid #334155;
        color: #fff;
        transition: all 0.2s;
      }
      input[type="number"]:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="glass-panel p-8 rounded-2xl shadow-2xl">
        <h1 class="text-3xl font-bold mb-2 tracking-tight">MVR Calculator</h1>
        <p class="text-slate-400 mb-8 text-sm">
          Calculate your true freelance hourly rate to avoid burnout.
        </p>

        <div class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-1"
              >Target Annual Net Income ($)</label
            >
            <input
              type="number"
              id="targetIncome"
              value="60000"
              class="w-full p-3 rounded-lg font-mono text-lg"
              oninput="calculateRate()"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-1"
              >Annual Business Expenses ($)</label
            >
            <p class="text-xs text-slate-500 mb-2">
              Software, internet, marketing, hardware.
            </p>
            <input
              type="number"
              id="expenses"
              value="5000"
              class="w-full p-3 rounded-lg font-mono text-lg"
              oninput="calculateRate()"
            />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-1"
                >Weeks Off / Year</label
              >
              <input
                type="number"
                id="weeksOff"
                value="4"
                max="52"
                class="w-full p-3 rounded-lg font-mono text-lg"
                oninput="calculateRate()"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-1"
                >Billable Hours / Week</label
              >
              <p class="text-xs text-slate-500 mb-2">
                Exclude admin & sales work.
              </p>
              <input
                type="number"
                id="billableHours"
                value="25"
                max="168"
                class="w-full p-3 rounded-lg font-mono text-lg"
                oninput="calculateRate()"
              />
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-1"
              >Estimated Tax Rate (%)</label
            >
            <input
              type="number"
              id="taxRate"
              value="20"
              max="100"
              class="w-full p-3 rounded-lg font-mono text-lg"
              oninput="calculateRate()"
            />
          </div>
        </div>
      </div>

      <div class="flex flex-col justify-center space-y-6">
        <div
          class="glass-panel p-8 rounded-2xl border-l-4 border-blue-500 shadow-2xl"
        >
          <h2
            class="text-lg font-semibold text-slate-400 uppercase tracking-wider mb-2"
          >
            Your Minimum Rate
          </h2>
          <div
            class="text-6xl font-black text-white mb-2 tracking-tighter"
            id="hourlyRate"
          >
            $0
          </div>
          <p class="text-slate-400">per billable hour</p>

          <div class="mt-8 pt-6 border-t border-slate-700">
            <div class="flex justify-between items-center mb-2">
              <span class="text-slate-400">Gross Revenue Needed:</span>
              <span class="font-mono font-bold text-lg" id="grossRevenue"
                >$0</span
              >
            </div>
            <div class="flex justify-between items-center">
              <span class="text-slate-400">Total Billable Hours/Year:</span>
              <span class="font-mono font-bold text-lg" id="totalHours">0</span>
            </div>
          </div>
        </div>

        <a
          href="https://ko-fi.com/devandrewvazh"
          target="_blank"
          class="block w-full bg-blue-600 hover:bg-blue-500 text-white text-center font-bold py-4 px-6 rounded-xl transition-colors shadow-lg shadow-blue-500/30"
        >
          ☕ Buy me a coffee / Support Tool
        </a>
      </div>
    </div>

    <script>
      function calculateRate() {
        // Получаем значения
        const targetIncome =
          parseFloat(document.getElementById("targetIncome").value) || 0;
        const expenses =
          parseFloat(document.getElementById("expenses").value) || 0;
        const weeksOff =
          parseFloat(document.getElementById("weeksOff").value) || 0;
        const billableHours =
          parseFloat(document.getElementById("billableHours").value) || 0;
        const taxRate =
          parseFloat(document.getElementById("taxRate").value) || 0;

        // Расчеты
        const taxMultiplier = 1 - taxRate / 100;
        const grossRevenueNeeded = targetIncome / taxMultiplier + expenses;
        const workingWeeks = Math.max(0, 52 - weeksOff);
        const totalBillableHours = workingWeeks * billableHours;

        let hourlyRate = 0;
        if (totalBillableHours > 0) {
          hourlyRate = grossRevenueNeeded / totalBillableHours;
        }

        // Обновление UI
        document.getElementById("hourlyRate").innerText =
          "$" + Math.ceil(hourlyRate);
        document.getElementById("grossRevenue").innerText =
          "$" + Math.ceil(grossRevenueNeeded).toLocaleString();
        document.getElementById("totalHours").innerText = totalBillableHours;
      }

      // Инициализация при загрузке
      calculateRate();
    </script>
  </body>
</html>
